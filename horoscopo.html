<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horóscopo de Hoje – Gêmeos</title>

  <meta name="description" content="Veja o horóscopo de hoje para Gêmeos: amor, trabalho, dinheiro, saúde e energia.">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .voltar {
      display: block;
      text-align: center;
      margin-top: 20px;
      padding: 12px;
      background: #6a5acd;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>🔮 Horóscopo de Hoje – Gêmeos</h1>

<div class="card"><strong>✨ Geral:</strong> <span id="geral"></span></div>
<div class="card"><strong>❤️ Amor:</strong> <span id="amor"></span></div>
<div class="card"><strong>💼 Trabalho:</strong> <span id="trabalho"></span></div>
<div class="card"><strong>💰 Dinheiro:</strong> <span id="dinheiro"></span></div>
<div class="card"><strong>🧘 Saúde:</strong> <span id="saude"></span></div>

<a href="index.html" class="voltar">⬅ Voltar</a>

<script>
const mensagens = {
  geral: [
    "Hoje é um dia de transformação e novas ideias.",
    "Você sentirá mais clareza nas decisões.",
    "Momento ideal para iniciar algo novo."
  ],
  amor: [
    "O amor pede mais atenção e diálogo.",
    "Uma conexão especial pode surgir.",
    "Evite discussões desnecessárias."
  ],
  trabalho: [
    "Foque nas prioridades.",
    "Uma oportunidade pode aparecer.",
    "Evite distrações hoje."
  ],
  dinheiro: [
    "Cuidado com gastos impulsivos.",
    "Momento bom para planejar finanças.",
    "Evite riscos financeiros hoje."
  ],
  saude: [
    "Cuide da sua energia mental.",
    "Momento bom para relaxar.",
    "Evite sobrecarga."
  ]
};

function rotacionar(lista) {
  const hoje = new Date().getDate();
  return lista[hoje % lista.length];
}

document.getElementById("geral").innerText = rotacionar(mensagens.geral);
document.getElementById("amor").innerText = rotacionar(mensagens.amor);
document.getElementById("trabalho").innerText = rotacionar(mensagens.trabalho);
document.getElementById("dinheiro").innerText = rotacionar(mensagens.dinheiro);
document.getElementById("saude").innerText = rotacionar(mensagens.saude);
</script>

</body>
</html>
