name: Gerar APK e AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configurar Bubblewrap sem perguntas
        run: |
          mkdir -p ~/.bubblewrap
          echo '{
            "jdkPath": "'"$JAVA_HOME"'",
            "androidSdkPath": "'"$ANDROID_SDK_ROOT"'"
          }' > ~/.bubblewrap/config.json

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias gemeoshoje \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass gemeoshoje123 \
            -keypass gemeoshoje123 \
            -dname "CN=Gemeos Hoje, O=Gemeos Hoje, C=BR"

      - name: Init Bubblewrap
        run: |
          mkdir build && cd build
          bubblewrap init \
            --manifest=https://gemeoshoje.com.br/manifest.json \
            --directory=. \
            --packageId=br.com.gemeoshoje \
            --signingKeyPath=../keystore.jks \
            --signingKeyAlias=gemeoshoje

      - name: Build
        run: |
          cd build
          bubblewrap build \
            --signingKeyPassword=gemeoshoje123 \
            --signingKeyStorePassword=gemeoshoje123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GemeosHoje-APK
          path: build/app-release-signed.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: GemeosHoje-AAB
          path: build/app-release-bundle.aab

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: Keystore-GUARDE-ESTE
          path: keystore.jks
