name: Gerar APK e AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias gemeoshoje \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass gemeoshoje123 \
            -keypass gemeoshoje123 \
            -dname "CN=Gemeos Hoje, O=Gemeos Hoje, C=BR"

      - name: Init e Build com Docker
        run: |
          docker run --rm \
            -v $PWD:/work \
            -w /work \
            ghcr.io/googlechromelabs/bubblewrap:latest \
            sh -c "bubblewrap init --manifest=https://gemeoshoje.com.br/manifest.json && bubblewrap build --signingKeyPassword=gemeoshoje123 --signingKeyStorePassword=gemeoshoje123"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GemeosHoje-APK
          path: app-release-signed.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: GemeosHoje-AAB
          path: app-release-bundle.aab
