<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meditações e Meditações Guiadas</title>

<meta name="description" content="Meditações guiadas para relaxamento, foco, energia e equilíbrio emocional.">

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(180deg,#0f0c29,#302b63,#24243e);
  color:white;
  padding:20px;
  text-align:center;
  line-height:1.6;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#6a5acd;
  color:white;
  cursor:pointer;
}

.card {
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:10px;
  margin-top:15px;
  text-align:left;
}

.voltar {
  display:block;
  margin-top:20px;
  padding:12px;
  background:#6a5acd;
  color:white;
  text-decoration:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🧘 Meditações</h1>

<p>Escolha uma meditação:</p>

<button onclick="mostrar('relaxamento')">Relaxamento</button>
<button onclick="mostrar('ansiedade')">Ansiedade</button>
<button onclick="mostrar('foco')">Foco</button>
<button onclick="mostrar('energia')">Energia</button>

<div id="conteudo"></div>

<a href="index.html" class="voltar">⬅ Voltar</a>

<script>
const meditacoes = {

relaxamento: `
<h3>Meditação de Relaxamento</h3>
<p>Feche os olhos lentamente. Respire profundamente pelo nariz, segurando o ar por alguns segundos, e solte pela boca.</p>
<p>Sinta seu corpo relaxando a cada respiração. Deixe os pensamentos passarem sem se prender a eles.</p>
<p>Permaneça nesse estado por alguns minutos, focando apenas na respiração.</p>
`,

ansiedade: `
<h3>Meditação para Ansiedade</h3>
<p>Coloque a atenção na sua respiração. Inspire contando até 4, segure 2 segundos, expire contando até 6.</p>
<p>Repita esse ciclo várias vezes.</p>
<p>Observe que você não é seus pensamentos — apenas observe-os passando.</p>
`,

foco: `
<h3>Meditação para Foco</h3>
<p>Sente-se com a coluna ereta. Escolha um ponto ou sua respiração para focar.</p>
<p>Sempre que a mente se distrair, traga de volta com suavidade.</p>
<p>Treine sua mente como um músculo.</p>
`,

energia: `
<h3>Meditação para Energia</h3>
<p>Respire profundamente e imagine uma luz entrando pelo topo da sua cabeça.</p>
<p>Essa luz percorre todo seu corpo, energizando cada parte.</p>
<p>Sinta seu corpo mais leve e ativo.</p>
`

};

function mostrar(tipo){
  document.getElementById("conteudo").innerHTML = meditacoes[tipo];
}
</script>

</body>
</html>
